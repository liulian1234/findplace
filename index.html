<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>伏尼契赏金大厅</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div id="viewer" onclick="this.style.display='none'"><img id="viewer-img"></div>

    <nav id="nav-bar">
        <div class="nav-item active" onclick="switchCat('voynich', this)">🏺 伏尼契手稿</div>
        <div class="nav-item" onclick="switchCat('game', this)">🎮 游戏任务</div>
        <div class="nav-item" onclick="switchCat('crack', this)">🔓 破解任务</div>
        <div class="nav-item" onclick="switchCat('progress', this)">⏳ 破解进度</div>
        <div class="nav-item" onclick="switchCat('bounty', this)">💰 赏金任务(已结案)</div>
        <div class="nav-item" onclick="switchCat('post', this)">✉️ 发布赏金</div>
        <a href="https://你的注册登录页面地址" class="auth-link">🔑 猎人登录/注册</a>
    </nav>

    <div id="container">
        <aside id="sidebar">
            <h3 class="sidebar-title">📊 任务情报站</h3>
            <div class="stat-grid">
                <div class="stat-box"><span class="stat-val">128</span><span class="stat-lab">参与猎人</span></div>
                <div class="stat-box"><span class="stat-val" id="online-num">--</span><span class="stat-lab">在线人数</span></div>
            </div>
            <div id="chart" style="height: 200px;"></div>
            
            <div class="notice-box">
                <b>📜 馆长的叮嘱：</b><br>
                漫长的搜寻终有尽头。当你揭开秘密时，请通过“提交证据”联系我。赏金将通过加密频道发放。已结案的谜题，将成为我们共同的勋章。
            </div>
        </aside>

        <main id="main">
            <section id="voynich" class="category-section active"><h2 class="title gold">伏尼契手稿 (Voynich)</h2><div id="voynich-list" class="task-grid"></div></section>
            <section id="game" class="category-section"><h2 class="title blue">🎮 游戏任务大厅</h2><div id="game-list" class="task-grid"></div></section>
            <section id="crack" class="category-section"><h2 class="title purple">🔓 破解任务终端</h2><div id="crack-list" class="task-grid"></div></section>
            <section id="progress" class="category-section"><h2 class="title silver">⏳ 实时破解进度</h2><div id="progress-list" class="task-grid"></div></section>
            <section id="bounty" class="category-section"><h2 class="title orange">💰 赏金档案馆 (已结案)</h2><div id="bounty-list" class="task-grid"></div></section>
            <section id="post" class="category-section"><h2 class="title green">发布悬赏</h2><div class="post-card"><p>需要发动全网猎人的力量？</p><a href="https://forms.gle/qACH4MgrUDwHaiyCA" target="_blank" class="btn green-btn">联系馆长发布任务</a></div></section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
