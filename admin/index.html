<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>馆长后台</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "liulian1234/findplace", // 确认这里改成了你自己的！
          branch: "main",
        },
        display_url: "https://findplace-xi.vercel.app",
        media_folder: "/",
        collections: [
          {
            name: "tasks",
            label: "悬赏任务",
            folder: "/",
            create: true,
            extension: "json",
            format: "json",
            fields: [
              { label: "编号", name: "id", widget: "string" },
              { label: "描述", name: "desc", widget: "text" },
              { label: "图片", name: "img", widget: "image" },
              { label: "金额", name: "price", widget: "string" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
