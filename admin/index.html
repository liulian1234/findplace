<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伏尼契赏金大厅 - 馆长专用</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <div id="nav-bar">
        <div class="logo">VOYNICH BOUNTY</div>
        <div class="nav-links">
            <span class="nav-item active" onclick="switchCat('voynich', this)">未解植物</span>
            <span class="nav-item" onclick="switchCat('history', this)">历史悬案</span>
        </div>
        <div class="status">在线：<span id="online-num">--</span></div>
    </div>

    <div id="main-layout">
        <div id="sidebar">
            <h3>任务实时分布</h3>
            <div id="chart"></div>
            <div class="notice">
                <p>⚠️ 馆长提示：证据请通过后台上传，严禁私下交易。</p>
            </div>
        </div>

        <div id="content">
            <div id="voynich" class="category-section active">
                <h2>未解植物悬赏</h2>
                <div id="task-list">加载中...</div>
            </div>
        </div>
    </div>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    <script src="script.js"></script>
</body>
</html>
